name: Sync body metrics from Webhook.site to Supabase

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run sync script
        env:
          WEBHOOK_SITE_URL: ${{ secrets.WEBHOOK_SITE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== DEBUG: python version / cwd / ls ==="
          python -c "import sys, os; print('PYTHON:', sys.version); print('CWD:', os.getcwd()); print('ARGV:', sys.argv)"
          ls -R
          echo "=== DEBUG: show sync_body_metrics.py content that is ACTUALLY imported ==="
          python - << 'EOF'
import os, sys, inspect

print("CWD:", os.getcwd())
print("sys.path:", sys.path)

try:
    import sync_body_metrics
    print("sync_body_metrics module file:", sync_body_metrics.__file__)
    print("----- sync_body_metrics.py source start -----")
    print(inspect.getsource(sync_body_metrics))
    print("----- sync_body_metrics.py source end -----")
except Exception as e:
    print("FAILED TO IMPORT sync_body_metrics:", repr(e))
    raise

EOF

          echo "=== RUN ACTUAL SCRIPT ==="
          python sync_body_metrics.py
